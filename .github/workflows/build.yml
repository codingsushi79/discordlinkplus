name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to GitHub Releases and Modrinth (even if gradle.properties unchanged)
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changes:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version_bump: ${{ steps.filter.outputs.version == 'true' || github.event.inputs.publish == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - gradle.properties

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25 (compile toolchain)
        id: java25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Gradle JDKs
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.paths=${{ steps.java25.outputs.path }}" >> gradle.properties

      - name: Set up Java 21 (Gradle runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build plugin
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLinkPlus
          path: build/libs/DiscordLinkPlus-*.jar
          if-no-files-found: error

  release:
    needs: [changes, build]
    if: |
      github.event_name != 'pull_request' &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.version_bump == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION="$(grep '^pluginVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          if [[ -z "$VERSION" ]]; then
            echo "Could not read pluginVersion from gradle.properties" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: DiscordLinkPlus
          path: build/libs

      - name: Verify artifact
        run: test -f "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar"

      - name: Check for existing tag
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping tag and GitHub release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "DiscordLink+ ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar" \
            --title "DiscordLink+ ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Load release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.tag_check.outputs.exists }}" == "true" ]]; then
            NOTES="Release ${{ steps.version.outputs.version }}"
          else
            NOTES="$(gh release view "${{ steps.version.outputs.tag }}" --json body -q .body)"
          fi
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "discordlink+"
          name: DiscordLink+ ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          channel: release
          status: draft
          changelog: ${{ steps.notes.outputs.body }}
          loaders: |-
            paper
            spigot
            bukkit
            folia
          game-versions: 26.1
          dependencies: |
            [{"project_id":"simple-voice-chat","dependency_type":"optional"}]
          files: build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar
