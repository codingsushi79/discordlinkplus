name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Java 25 first, then Java 21 last so JAVA_HOME points at 21 (Gradle runtime).
      # Gradle 8.x Kotlin DSL cannot run on Java 25.
      - name: Set up Java 25 (compile toolchain)
        id: java25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Gradle JDKs
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.paths=${{ steps.java25.outputs.path }}" >> gradle.properties

      - name: Set up Java 21 (Gradle runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java setup
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build plugin
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLinkPlus
          path: build/libs/DiscordLinkPlus-*.jar
          if-no-files-found: error
