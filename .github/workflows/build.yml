name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to GitHub Releases and Modrinth (even if tag already exists)
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve project version
        id: version
        run: |
          VERSION="$(grep '^pluginVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          if [[ -z "$VERSION" ]]; then
            echo "Could not read pluginVersion from gradle.properties" >&2
            exit 1
          fi
          TAG="v${VERSION}"

          SHOULD_RELEASE=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_RELEASE=false
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.publish }}" == "true" ]]; then
            SHOULD_RELEASE=true
          elif git rev-parse "${TAG}^{tag}" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should-release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"

          if [[ "$SHOULD_RELEASE" == "true" ]]; then
            echo "Will publish version ${VERSION} (${TAG})"
          else
            echo "Build only — no release for version ${VERSION}"
          fi

      - name: Set up Java 25 (compile toolchain)
        id: java25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Gradle JDKs
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.paths=${{ steps.java25.outputs.path }}" >> gradle.properties

      - name: Set up Java 21 (Gradle runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build plugin
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Resolve plugin jar
        id: jar
        run: |
          JAR_PATH="build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar"
          if [[ ! -f "$JAR_PATH" ]]; then
            echo "::error::Expected jar not found: $JAR_PATH"
            ls -la build/libs/ || true
            exit 1
          fi
          echo "path=${JAR_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLinkPlus
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Check for existing tag
        if: steps.version.outputs.should-release == 'true'
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}^{tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping GitHub release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.version.outputs.should-release == 'true' && steps.tag_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}

      - name: Resolve Modrinth project
        if: steps.version.outputs.should-release == 'true'
        id: modrinth
        run: |
          PROJECT_ID=$(curl -fsSL "https://api.modrinth.com/v2/project/discordlink%2B/check" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "project-id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"

      - name: Set Modrinth metadata
        if: steps.version.outputs.should-release == 'true'
        id: modrinth-meta
        run: |
          GAME_VERSION_RANGE=26.x.x
          echo "version=${{ steps.version.outputs.version }}+${GAME_VERSION_RANGE}" >> "$GITHUB_OUTPUT"
          echo "name=DiscordLink+ [v${{ steps.version.outputs.version }}+${GAME_VERSION_RANGE}]" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: steps.version.outputs.should-release == 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ steps.modrinth.outputs.project-id }}
          name: ${{ steps.modrinth-meta.outputs.name }}
          version: ${{ steps.modrinth-meta.outputs.version }}
          changelog: Automated release for ${{ steps.version.outputs.tag }}
          channel: release
          loaders: |-
            paper
            spigot
            bukkit
            folia
          game-versions: |-
            26.1.x
          files: ${{ steps.jar.outputs.path }}
