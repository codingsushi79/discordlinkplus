name: Release

on:
  push:
    branches: [main, master]
    paths:
      - gradle.properties
  workflow_dispatch:
    inputs:
      version:
        description: Version override (defaults to pluginVersion in gradle.properties)
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(grep '^pluginVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Could not determine version." >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 25
        if: steps.tag_check.outputs.skip != 'true'
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Verify Java version
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          if ! java -version 2>&1 | grep -qE 'version "25(\.|")'; then
            echo "Java 25 is required for this build." >&2
            exit 1
          fi

      - name: Build plugin
        if: steps.tag_check.outputs.skip != 'true'
        env:
          CI: true
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: ./gradlew shadowJar --no-daemon -PpluginVersion=${{ steps.version.outputs.version }}

      - name: Verify artifact
        if: steps.tag_check.outputs.skip != 'true'
        run: test -f "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar"

      - name: Create and push tag
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "DiscordLink+ ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip != 'true'
        id: github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar" \
            --title "DiscordLink+ ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Load release notes
        if: steps.tag_check.outputs.skip != 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="$(gh release view "${{ steps.version.outputs.tag }}" --json body -q .body)"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: steps.tag_check.outputs.skip != 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "discordlink+"
          name: DiscordLink+ ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          channel: release
          changelog: ${{ steps.notes.outputs.body }}
          loaders: |-
            paper
            spigot
            bukkit
            folia
          game-versions: 26.1
          dependencies: |
            [{"project_id":"simple-voice-chat","dependency_type":"optional"}]
          files: build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar
