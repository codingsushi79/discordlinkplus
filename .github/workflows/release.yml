name: Release

on:
  push:
    branches: [main, master]
    paths:
      - gradle.properties
  workflow_dispatch:
    inputs:
      version:
        description: Version override (defaults to pluginVersion in gradle.properties)
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.tag_check.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(grep '^pluginVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Could not determine version." >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25 (compile toolchain)
        id: java25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Configure Gradle JDKs
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.paths=${{ steps.java25.outputs.path }}" >> gradle.properties

      - name: Set up Java 21 (Gradle runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build plugin
        run: ./gradlew shadowJar --no-daemon -PpluginVersion=${{ needs.prepare.outputs.version }} --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLinkPlus-${{ needs.prepare.outputs.version }}
          path: build/libs/DiscordLinkPlus-${{ needs.prepare.outputs.version }}.jar
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: DiscordLinkPlus-${{ needs.prepare.outputs.version }}
          path: build/libs

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "DiscordLink+ ${{ needs.prepare.outputs.version }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            "build/libs/DiscordLinkPlus-${{ needs.prepare.outputs.version }}.jar" \
            --title "DiscordLink+ ${{ needs.prepare.outputs.version }}" \
            --generate-notes

      - name: Load release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="$(gh release view "${{ needs.prepare.outputs.tag }}" --json body -q .body)"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: "discordlink+"
          name: DiscordLink+ ${{ needs.prepare.outputs.version }}
          version: ${{ needs.prepare.outputs.version }}
          channel: release
          changelog: ${{ steps.notes.outputs.body }}
          loaders: |-
            paper
            spigot
            bukkit
            folia
          game-versions: 26.1
          dependencies: |
            [{"project_id":"simple-voice-chat","dependency_type":"optional"}]
          files: build/libs/DiscordLinkPlus-${{ needs.prepare.outputs.version }}.jar
