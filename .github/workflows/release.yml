name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Release tag is empty." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Build plugin
        run: ./gradlew shadowJar --no-daemon -PpluginVersion=${{ steps.version.outputs.version }}

      - name: Verify artifact
        run: test -f "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar" \
            --clobber

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT_ID }}
          name: DiscordLink+ ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          channel: release
          changelog: ${{ github.event.release.body }}
          loaders: |-
            paper
            spigot
            bukkit
            folia
          game-versions: 26.1
          dependencies: |
            [{"project_id":"9eGKb6K1","dependency_type":"optional"}]
          files: build/libs/DiscordLinkPlus-${{ steps.version.outputs.version }}.jar
